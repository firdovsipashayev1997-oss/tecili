<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayramınız Mübarək!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1b69 40%, #11998e 100%);
      font-family: 'Georgia', serif;
      overflow: hidden;
    }
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.9; transform: scale(1.2); }
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 40px;
    }
    .moon {
      font-size: 72px;
      margin-bottom: 16px;
      display: block;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 24px rgba(255,230,100,0.7));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    h1 {
      font-size: clamp(36px, 8vw, 80px);
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      text-shadow:
        0 0 20px rgba(255, 220, 80, 0.8),
        0 0 60px rgba(255, 180, 50, 0.4),
        0 4px 16px rgba(0,0,0,0.5);
      animation: glow 3s ease-in-out infinite;
      line-height: 1.2;
    }
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 20px rgba(255,220,80,.8), 0 0 60px rgba(255,180,50,.4), 0 4px 16px rgba(0,0,0,.5); }
      50% { text-shadow: 0 0 40px rgba(255,220,80,1), 0 0 100px rgba(255,180,50,.7), 0 4px 16px rgba(0,0,0,.5); }
    }
    .subtitle {
      margin-top: 24px;
      font-size: clamp(16px, 3vw, 22px);
      color: rgba(255,255,255,0.75);
      letter-spacing: 3px;
      font-style: italic;
    }
    .ornament {
      margin: 28px auto 0;
      width: 180px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,220,80,0.8), transparent);
      border-radius: 2px;
    }
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }
    .dot {
      position: absolute;
      border-radius: 2px;
      animation: fall var(--fd, 4s) linear infinite var(--fdelay, 0s);
      opacity: 0;
    }
    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="confetti-wrap" id="confetti"></div>
  <div class="container">
    <span class="moon">☪️</span>
    <h1>Bayramınız Mübarək!</h1>
    <div class="ornament"></div>
    <p class="subtitle">Xoşbəxtlik, sağlıq və sevinc arzulayırıq</p>
  </div>

  <script>
    // Stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s`;
      starsEl.appendChild(s);
    }
    // Confetti
    const confEl = document.getElementById('confetti');
    const colors = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98FB98'];
    for (let i = 0; i < 60; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      const w = 4 + Math.random() * 8;
      d.style.cssText = `left:${Math.random()*100}%;width:${w}px;height:${w*1.5}px;background:${colors[Math.floor(Math.random()*colors.length)]};--fd:${3+Math.random()*5}s;--fdelay:${Math.random()*6}s`;
      confEl.appendChild(d);
    }
  </script>
</body>
</html>
